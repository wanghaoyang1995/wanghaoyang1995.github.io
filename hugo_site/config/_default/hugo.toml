baseURL = "https://wanghaoyang1995.github.io/"
timeZone = "Asia/Shanghai"

defaultContentLanguage = "zh-cn"
defaultContentLanguageInSubdir = false
[languages]
  [languages.zh-cn]
    contentDir = "content/zh-cn"
    languageCode = "zh-CN"
    languageName = "中文"
    title = "WHY的博客空间"
    weight = 1
    [languages.zh-cn.pagination]
      disableAliases = false
      pagerSize = 10
      path = "page"
    [languages.zh-cn.Params]
      description = "WHY的个人站点"
      subtitle = "我什么也不做，并且睡得很晚"
      author = "WHY"
      author_desc = "众人熙熙，如享太牢，如春登台。\n我独泊兮其未兆，如婴儿之未孩，傫傫兮，若无所归。\n众人皆有余，而我独若遗。\n我愚人之心也哉，沌沌兮！"

  [languages.en-us]
    contentDir = "content/en-us"
    languageCode = "en-US"
    languageName = "English"
    title = "Wyatt Wang's Space"
    weight = 2
    [languages.en-us.pagination]
      disableAliases = false
      pagerSize = 10
      path = "page"
    [languages.en-us.Params]
      description = "Wyatt Wang's Space"
      subtitle = "Some dreams sound too wild when spoken aloud."
      author = "Wyatt Wang"
      author_desc = "Everyone seems full and satisfied,\nenjoying feasts and festivals.\n\nI alone remain quiet and still,\nlike an infant not yet awakened."

[outputFormats]
  [outputFormats.search_index]
    name = "json"
    mediaType = "application/json"
    baseName = "search_index"
    isPlainText = true
    notAlternative = true
  [outputFormats.year_month_index]
    name = "json"
    mediaType = "application/json"
    baseName = "year_month_index"
    isPlainText = true
    notAlternative = true
  [outputFormats.post_day_mark]
    name = "json"
    mediaType = "application/json"
    baseName = "post_day_mark"
    isPlainText = true
    notAlternative = true

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"
  archives = "archives"

[params]
  mainSections = ["posts"]  # mainSections下的文档会用于生成search_index.json, 用来文章检索
  math = false  # 默认关闭mathjax支持, 需要的话在Front Matter打开
  enable_giscus = true  # 是否启用github评论功能
  author_github = "https://github.com/wanghaoyang1995"
  author_bilibili = "https://space.bilibili.com/114557736"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]
